name: datamind
description: DataMind - An Intelligent Predictive Analytics Platform for Bridging Data Gaps and Enabling Real-Time Decision-Making

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2
  
  # Charts & Data Visualization
  fl_chart: ^0.66.2
  syncfusion_flutter_charts: ^24.1.41

  # State Management
  provider: ^6.1.1

  # Navigation
  go_router: ^13.0.0

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  percent_indicator: ^4.2.3
  fl_heatmap: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
